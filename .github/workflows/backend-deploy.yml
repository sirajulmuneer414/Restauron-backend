name: Deploy Backend

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/restauron-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/restauron-backend:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/restauron-backend/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Pass all app secrets as environment variables into the SSH session
          envs: DOCKER_USERNAME,MYSQL_PASSWORD,APPLICATION_SECURITY_JWT_SECRET_KEY,APPLICATION_SECURITY_JWT_EXPIRATION,APPLICATION_SECURITY_JWT_REFRESH-TOKEN_EXPIRATION,APP_FRONTEND_URL,APP_ENCRYPTION_KEY,APP_ENCRYPTION_ALGORITHM,APP_ADMIN_PASSWORD,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,RAZORPAY_SECRET,MAIL_PASSWORD,SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI
          script: |
            cd ~/restauron-backend

            # Write a fresh .env from GitHub Secrets on every deploy
            cat > .env << EOF
            DOCKER_USERNAME=$DOCKER_USERNAME
            MYSQL_PASSWORD=$MYSQL_ROOT_PASSWORD
            APPLICATION_SECURITY_JWT_SECRET_KEY=$APPLICATION_SECURITY_JWT_SECRET_KEY
            APPLICATION_SECURITY_JWT_REFRESH-TOKEN_EXPIRATION=$APPLICATION_SECURITY_JWT_REFRESH-TOKEN_EXPIRATION
            APPLICATION_SECURITY_JWT_EXPIRATION=$APPLICATION_SECURITY_JWT_EXPIRATION
            APP_FRONTEND_URL=$APP_FRONTEND_URL
            APP_ENCRYPTION_KEY=$APP_ENCRYPTION_KEY
            APP_ENCRYPTION_ALGORITHM=$APP_ENCRYPTION_ALGORITHM
            APP_ADMIN_PASSWORD=$APP_ADMIN_PASSWORD
            CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            RAZORPAY_SECRET=$RAZORPAY_SECRET
            MAIL_PASSWORD=$MAIL_PASSWORD
            SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=$SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI

            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          APPLICATION_SECURITY_JWT_SECRET_KEY: ${{ secrets.JWT_SECRET }}
          APPLICATION_SECURITY_JWT_REFRESH-TOKEN_EXPIRATION: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}
          APPLICATION_SECURITY_JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          APP_FRONTEND_URL: ${{ secrets.APP_FRONTEND_URL }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_ENCRYPTION_ALGORITHM: ${{ secrets.APP_ENCRYPTION_ALGORITHM }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI }}
